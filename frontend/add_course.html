<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Add or edit a course in Student Manager."/>
  <title>Add Course | Student Manager</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🎓</div>
      <h2>Student Manager</h2>
      <span>Academic Platform</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <a href="index.html"       class="nav-link"><span class="nav-icon">⊞</span> Dashboard</a>
      <div class="nav-section-label">Manage</div>
      <a href="students.html"    class="nav-link"><span class="nav-icon">👨‍🎓</span> Students</a>
      <a href="courses.html"     class="nav-link"><span class="nav-icon">📚</span> Courses</a>
      <a href="enroll.html"      class="nav-link"><span class="nav-icon">🔗</span> Enrollments</a>
      <div class="nav-section-label">Actions</div>
      <a href="add_student.html" class="nav-link"><span class="nav-icon">＋</span> Add Student</a>
      <a href="add_course.html"  class="nav-link active"><span class="nav-icon">＋</span> Add Course</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1 id="form-title">Add New Course</h1>
      <p>Fill in the course details below</p>
    </div>

    <div class="card" style="max-width:560px;">
      <form id="course-form" novalidate>
        <div class="form-group">
          <label for="course_name">Course Name *</label>
          <input type="text" id="course_name" class="form-control" placeholder="e.g. Data Structures & Algorithms" required/>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label for="credits">Credits *</label>
            <input type="number" id="credits" class="form-control" placeholder="e.g. 4" min="1" max="10" required/>
          </div>
          <div class="form-group">
            <label for="instructor_name">Instructor Name *</label>
            <input type="text" id="instructor_name" class="form-control" placeholder="e.g. Dr. Priya Menon" required/>
          </div>
        </div>

        <p id="form-error" class="form-error-banner hidden"></p>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">＋ Add Course</button>
          <a href="courses.html" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="js/api.js"></script>
<script>
const params   = new URLSearchParams(window.location.search);
const editId   = params.get("edit");
const editMode = !!editId;

if (editMode) {
  document.getElementById("form-title").textContent = "Edit Course";
  document.getElementById("submit-btn").textContent = "💾 Save Changes";

  (async () => {
    const res = await CoursesAPI.getById(editId);
    if (!res.success) { showToast(res.error, "error"); return; }
    const c = res.course;
    document.getElementById("course_name").value     = c.course_name;
    document.getElementById("credits").value         = c.credits;
    document.getElementById("instructor_name").value = c.instructor_name;
  })();
}

document.getElementById("course-form").addEventListener("submit", async e => {
  e.preventDefault();
  const errEl = document.getElementById("form-error");
  errEl.classList.add("hidden");

  const data = {
    course_name:     document.getElementById("course_name").value.trim(),
    credits:         document.getElementById("credits").value,
    instructor_name: document.getElementById("instructor_name").value.trim(),
  };

  if (!data.course_name)     { errEl.textContent = "Course name is required.";     errEl.classList.remove("hidden"); return; }
  if (!data.credits)         { errEl.textContent = "Credits are required.";         errEl.classList.remove("hidden"); return; }
  if (!data.instructor_name) { errEl.textContent = "Instructor name is required."; errEl.classList.remove("hidden"); return; }

  const btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.textContent = "Saving…";

  const res = editMode
    ? await CoursesAPI.update(editId, data)
    : await CoursesAPI.create(data);

  btn.disabled = false;
  btn.textContent = editMode ? "💾 Save Changes" : "＋ Add Course";

  if (res.success) {
    showToast(editMode ? "Course updated!" : "Course created!");
    setTimeout(() => { window.location.href = "courses.html"; }, 900);
  } else {
    errEl.textContent = res.error;
    errEl.classList.remove("hidden");
  }
});
</script>
</body>
</html>
